<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <!-- Radial fade for topo waves -->
    <radialGradient id="fade" cx="0.5" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="wave-mask">
      <rect width="1200" height="630" fill="url(#fade)"/>
    </mask>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0e14"/>

  <!-- Topographic wave wireframe — rainbow hues, faded edges -->
  <g mask="url(#wave-mask)" opacity="0.18">
    <path d="M0 420 Q150 405 300 418 T600 408 T900 420 T1200 412" stroke="#40c040" stroke-width="1" fill="none"/>
    <path d="M0 440 Q180 420 360 435 T720 425 T1080 438 T1200 430" stroke="#80d040" stroke-width="0.8" fill="none"/>
    <path d="M0 460 Q180 438 360 455 T720 445 T1080 458 T1200 450" stroke="#ffd700" stroke-width="1" fill="none"/>
    <path d="M0 480 Q200 455 400 475 T800 460 T1200 470" stroke="#ffa040" stroke-width="0.8" fill="none"/>
    <path d="M0 500 Q200 475 400 495 T800 480 T1200 490" stroke="#ff8c00" stroke-width="1" fill="none"/>
    <path d="M0 520 Q150 490 300 510 T600 495 T900 515 T1200 500" stroke="#ff4040" stroke-width="1" fill="none"/>
    <path d="M0 540 Q150 510 300 530 T600 515 T900 535 T1200 520" stroke="#ff60a0" stroke-width="0.8" fill="none"/>
    <path d="M0 560 Q140 540 280 555 T560 542 T840 558 T1200 548" stroke="#c060ff" stroke-width="1" fill="none"/>
    <path d="M0 580 Q140 558 280 575 T560 562 T840 578 T1200 568" stroke="#00d4ff" stroke-width="0.8" fill="none"/>
    <path d="M0 600 Q200 585 400 598 T800 588 T1200 595" stroke="#4080ff" stroke-width="1" fill="none"/>
    <!-- Vertical cross-lines -->
    <path d="M150 410 L150 610" stroke="#ff60a0" stroke-width="0.4" fill="none"/>
    <path d="M350 408 L350 608" stroke="#c060ff" stroke-width="0.4" fill="none"/>
    <path d="M550 410 L550 610" stroke="#40c0ff" stroke-width="0.4" fill="none"/>
    <path d="M750 407 L750 607" stroke="#40e0a0" stroke-width="0.4" fill="none"/>
    <path d="M950 410 L950 610" stroke="#e0e040" stroke-width="0.4" fill="none"/>
    <path d="M1100 409 L1100 609" stroke="#ff4060" stroke-width="0.4" fill="none"/>
  </g>

  <!-- Glass cube in rounded container -->
  <rect x="80" y="64" width="100" height="100" rx="20" fill="#151a22"/>
  <g transform="translate(90, 74) scale(2.5)">
    <!-- Translucent glass cube faces -->
    <path d="M16 5 L27 11.5 L16 18 L5 11.5Z" fill="white" opacity="0.18"/>
    <path d="M5 11.5 L16 18 L16 27 L5 20.5Z" fill="white" opacity="0.08"/>
    <path d="M16 18 L27 11.5 L27 20.5 L16 27Z" fill="white" opacity="0.12"/>
    <!-- Edge highlights -->
    <path d="M16 5 L27 11.5 L16 18 L5 11.5Z M5 11.5 L5 20.5 L16 27 L27 20.5 L27 11.5 M16 18 L16 27"
          stroke="rgba(255,255,255,0.55)" stroke-width="0.5" fill="none"/>
    <path d="M16 5 L27 11.5 L16 18 L5 11.5Z"
          stroke="rgba(255,255,255,0.25)" stroke-width="0.3" fill="none"/>
  </g>

  <!-- Brand name -->
  <text x="208" y="108"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="52" font-weight="600"
        fill="rgba(255,255,255,0.92)"
        letter-spacing="-0.5">
    whiteb0x
  </text>

  <!-- Tagline -->
  <text x="208" y="142"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="400"
        fill="rgba(255,255,255,0.45)">
    A Development Studio
  </text>

  <!-- Feature dots -->
  <text x="80" y="208"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="16" font-weight="400"
        fill="rgba(255,255,255,0.30)">
    Web · Blockchain · Full-Stack
  </text>

  <!-- CTA Button — solid white -->
  <rect x="80" y="440" width="240" height="48" rx="10"
        fill="rgba(255,255,255,0.92)"/>
  <text x="200" y="470"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="16" font-weight="600"
        fill="#0a0e14"
        letter-spacing="0.2"
        text-anchor="middle">
    Let's Build Something
  </text>

  <!-- URL -->
  <text x="80" y="530"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="400"
        fill="rgba(255,255,255,0.25)">
    whiteb0x.com
  </text>
</svg>
